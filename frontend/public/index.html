<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
        <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
        <meta name="color-scheme" content="dark light" />
        <meta name="format-detection" content="telephone=no" />
        <meta name="robots" content="index, follow" />
        <meta name="description" content="STARTON — Strategic creative agency building brands, websites, and growth systems for ambitious businesses." />
        <meta property="og:title" content="STARTON — Strategy That Builds Momentum" />
        <meta property="og:description" content="Strategic creative agency building brands, websites, and growth systems for ambitious businesses." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://starton.agency" />
        <meta name="twitter:card" content="summary_large_image" />
        <!-- Canonical is set per-route by the SEO component (react-helmet-async). -->
        <link rel="icon" type="image/webp" href="/images/starton-wordmarker-350.webp" />
        <link rel="apple-touch-icon" href="/images/starton-wordmarker-700.webp" />

        <!-- Preconnect for non-blocking font load -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- Preload above-the-fold assets -->
        <link rel="preload" as="image" type="image/webp" href="/images/hero-bg-800.webp" media="(max-width: 768px)" fetchpriority="high" />
        <link rel="preload" as="image" type="image/webp" href="/images/hero-bg-1600.webp" media="(min-width: 769px)" fetchpriority="high" />
        <link rel="preload" as="image" type="image/png" href="/images/starton-wordmarker.png" fetchpriority="high" />

        <!-- Non-blocking font load -->
        <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
        <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" /></noscript>

        <title>STARTON — Strategy That Builds Momentum</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
